  - name: site-content
    label: Textos editáveis do site
    type: file
    path: assets/data/site-content.json
    format: json
    fields:
      - name: heroEyebrow
        label: Chamada acima do título principal
        type: string
        required: true
      - name: heroIntro
        label: Texto de apresentação
        type: text
        required: true
      - name: heroIntroHighlight
        label: Destaque da apresentação
        type: string
        required: true
      - name: manifestoAside
        label: Frase da seção A ideia
        type: text
        required: true
      - name: paintIntro
        label: Texto da experiência de pintura
        type: text
        required: true
      - name: collectionsIntro
        label: Apresentação das coleções
        type: text
        required: true
      - name: contactIntro
        label: Texto da seção de contato
        type: text
        required: true
      - name: finalEyebrow
        label: Chamada acima do título final
        type: string
        required: true
      - name: finalTitle
        label: Primeira linha do título final
        type: string
        required: true
      - name: finalHighlight
        label: Linha destacada do título final
        type: string
        required: true
      - name: finalButton
        label: Texto do botão final
        type: string
        required: true

settings:
  hide: true
  commit:
    templates:
      create: "Adicionar {filename} pelo painel"
      update: "Atualizar {filename} pelo painel"
      delete: "Remover {filename} pelo painel"
