                  - name: tag
                    label: Categoria curta
                    type: string
                    required: true
                  - name: description
                    label: Descrição
                    type: text
                    required: true
                  - name: specs
                    label: Especificações próprias
                    type: object
                    description: Preencha apenas quando forem diferentes das informações padrão.
                    fields:
                      - name: material
                        label: Material
                        type: string
                      - name: sizes
                        label: Tamanhos
                        type: string
                      - name: finish
                        label: Acabamento
                        type: string
                  - name: purchase
                    label: Links próprios de compra
