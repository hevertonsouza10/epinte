                      - name: direct
                        label: Compra direta
                        type: string
                      - name: wholesale
                        label: Atacado
                        type: string

          - name: aventura
            label: Coleção imaginação e aventura
            type: object
            fields:
              - name: name
                label: Nome da coleção
                type: string
                required: true
              - name: description
                label: Descrição da coleção
